<!DOCTYPE html>
<html>

<head>

<title>Add Website</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Add Website</h1>

<div class="upload-box">

<form method="POST">

<input type="text"
name="title"
placeholder="Website Name"
required>

<input type="text"
name="link"
placeholder="Website Link"
required>

<input type="text"
name="description"
placeholder="Description"
required>

<button type="submit">
Add Website
</button>

</form>

</div>

</div>

</body>

</html>
