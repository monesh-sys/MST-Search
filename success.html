<!DOCTYPE html>
<html>

<head>

<title>Success</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>
    .success-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.success-card{
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

.success-card h1{
    color:#34A853;
    font-size:50px;
    margin-bottom:20px;
}

.success-card p{
    font-size:20px;
    color:#555;
    margin-bottom:30px;
}

.success-card button{
    margin:10px;
    padding:15px 25px;
    border:none;
    border-radius:30px;
    background:#4285F4;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.add-again{
    background:#34A853 !important;
}
</style>

</head>

<body>

<div class="success-page">

<div class="success-card">

<h1>✅ Website Added</h1>

<p>
Your website was submitted successfully.
</p>

<a href="/">

<button>
🏠 Go Home
</button>

</a>

<a href="/add">

<button class="add-again">
➕ Add Another
</button>

</a>

</div>

</div>

</body>

</html>
